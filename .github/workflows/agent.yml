name: GHOST Agent

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Run one agent cycle
        run: node scripts/run-cycle.js
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          RPC_URL: "https://evmrpc-testnet.0g.ai"
          CONTRACT_ADDRESS: "0x58282264D3e65F3026014026DFb2f428E141A0Bd"
      - name: Commit cycle data
        run: |
          git config user.name "GHOST Agent"
          git config user.email "ghost@0g.ai"
          git add -f data/cycles.json
          git diff --staged --quiet || git commit -m "agent: cycle #$(node -e 'const c=require("./data/cycles.json");console.log(c[0].cycle)') complete [skip ci]"
          git push
